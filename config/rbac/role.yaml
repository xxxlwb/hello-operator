---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - hello.demo.io
  resources:
  - helloapps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - hello.demo.io
  resources:
  - helloapps/finalizers
  verbs:
  - update
- apiGroups:
  - hello.demo.io
  resources:
  - helloapps/status
  verbs:
  - get
  - patch
  - update
